services:
  pocketbase:
    build: ./pocketbase
    container_name: poker_db
    volumes:
      - ./pb_data:/pb/pb_data
    ports:
      - "8090:8080" # LAN-only admin access. Do not route this through the Cloudflare Tunnel.
    restart: unless-stopped

  poker-app:
    build:
      context: ./SK
      dockerfile: Dockerfile
    container_name: poker_ui
    environment:
      - SECRET_POCKETBASE_URL=http://pocketbase:8080
      - ORIGIN=${ORIGIN}
    ports:
      - "3000:3000" # Optional: lets you hit the app directly over LAN without the tunnel
    restart: unless-stopped
    depends_on:
      - pocketbase

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: poker_tunnel
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - poker-app
